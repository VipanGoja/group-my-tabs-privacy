<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Exporter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      line-height: 1.5;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 16px 0;
    }

    canvas {
      border: 1px solid #ccc;
      image-rendering: auto;
    }

    a {
      display: inline-block;
      padding: 8px 12px;
      background: #eee;
      color: #111;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Group My Tabs Icon Exporter</h1>
  <p>This page creates 16×16, 32×32, and 48×48 PNG files from your 128×128 source icon.</p>

  <div id="output"></div>

  <script>
    const sourceImage = "./icon128.png";
    const sizes = [16, 32, 48];

    const img = new Image();
    img.src = sourceImage;

    img.onload = () => {
      const output = document.getElementById("output");

      sizes.forEach((size) => {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, size, size);

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        ctx.drawImage(img, 0, 0, size, size);

        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);

          const link = document.createElement("a");
          link.href = url;
          link.download = `icon-${size}.png`;
          link.textContent = `Download icon-${size}.png`;

          const label = document.createElement("span");
          label.textContent = `${size} × ${size}`;

          const row = document.createElement("div");
          row.className = "row";
          row.appendChild(canvas);
          row.appendChild(label);
          row.appendChild(link);

          output.appendChild(row);
        }, "image/png");
      });
    };

    img.onerror = () => {
      document.body.insertAdjacentHTML(
        "beforeend",
        "<p><strong>Error:</strong> Could not find icon128.png. Make sure the filename is exactly correct.</p>"
      );
    };
  </script>
</body>
</html>
